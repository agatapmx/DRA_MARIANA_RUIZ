<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dra. Mariana Ruíz | Ginecología &amp; Obstetricia · Medicina Materno Fetal</title>

<!-- Google Fonts: Poppins (sans-serif limpia y moderna) para todo el documento -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root{
    /* ---- Paleta de colores Dra. Mariana Ruíz ---- */
    --cream: #FFFFFF;          /* fondo del sello, blanco puro/transparente */
    --card-bg-color: #FAF8F5;  /* blanco roto para la tarjeta */
    --pink: #D4A3A8;           /* rosa palo/empolvado para los botones */
    --pink-dark: #B37A80;      /* hover de los botones, rosa más profundo */
    --ink: #4A4A4A;            /* gris oscuro y formal para el texto */
    --ink-soft: #4A4A4A;
    --card-bg: rgba(250, 248, 245, 0.90); /* tarjeta translúcida sobre la foto */
    --shadow: rgba(60, 45, 45, 0.16);
  }

  *{
    box-sizing: border-box;
  }

  html, body{
    margin: 0;
    padding: 0;
    min-height: 100%;
  }

  body{
    font-family: 'Poppins', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 16px;

    background: #1f1a1a;
  }

  /* ============ IMAGEN DE FONDO ============ */
  .bg-wrapper{
    position: fixed;
    inset: 0;
    z-index: -1;
  }

  .bg-wrapper img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .bg-overlay{
    position: absolute;
    inset: 0;
    background: rgba(30, 20, 20, 0.25);
  }

  /* ============ TARJETA PRINCIPAL ============ */
  .card{
    position: relative;
    width: 100%;
    max-width: 380px;
    background: var(--card-bg);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-radius: 32px;
    padding: 176px 28px 44px;
    box-shadow: 0 20px 45px var(--shadow);
    text-align: center;
  }

  /* ============ SELLO / LOGO OVALADO (acostado) ============ */
  .seal{
    position: absolute;
    top: -38px;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    height: 190px;
  }

  .seal-shape{
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: var(--cream);
    box-shadow: 0 10px 25px var(--shadow);
    overflow: hidden;
  }

  .seal-shape img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* ============ BOTONES DE ENLACE ============ */
  .links{
    list-style: none;
    margin: 0 0 28px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .links a{
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background: var(--pink);
    color: #ffffff;
    text-decoration: none;
    font-family: 'Poppins', sans-serif;
    font-weight: 500;
    font-size: 16px;
    letter-spacing: 0.2px;
    padding: 16px 20px;
    border-radius: 999px;
    box-shadow: 0 6px 14px var(--shadow);
    transition: transform 0.18s ease, background-color 0.18s ease, box-shadow 0.18s ease;
  }

  .links a i{
    font-size: 18px;
    flex-shrink: 0;
    color: #ffffff;
  }

  .links a:hover,
  .links a:focus-visible{
    background: var(--pink-dark);
    transform: translateY(-2px) scale(1.015);
    box-shadow: 0 10px 20px var(--shadow);
  }

  .links a:active{
    transform: translateY(0) scale(0.99);
  }

  .links a:focus-visible{
    outline: 2px solid var(--ink);
    outline-offset: 3px;
  }

  /* ============ DATOS DE CONTACTO ============ */
  .contact{
    font-family: 'Poppins', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 1.8;
    color: var(--ink);
  }

  .contact p{
    margin: 0;
  }

  .contact .specialties{
    margin-bottom: 14px;
  }

  .contact .specialties p{
    margin: 2px 0;
  }

  .contact .meta{
    font-size: 14px;
    color: var(--ink);
  }

  @media (max-width: 360px){
    .card{
      padding-top: 151px;
      border-radius: 26px;
    }
    .seal{
      width: 210px;
      height: 165px;
      top: -34px;
    }
    .links a{
      font-size: 15px;
      padding: 14px 18px;
    }
  }
</style>
</head>
<body>

  <!-- ============ IMAGEN DE FONDO ============ -->
  <div class="bg-wrapper">
    <img src="MARIANA fondo_FINAL.png" alt="Fondo de la Dra. Mariana Ruíz">
    <div class="bg-overlay"></div>
  </div>

  <main class="card">

    <!-- ============ SELLO / LOGO ============ -->
    <div class="seal">
      <div class="seal-shape">
        <!-- Insertar logo de la Dra. Mariana aquí -->
        <img src="MARIANA logo_FINAL.jpg" alt="Logo Dra. Mariana Ruíz">
      </div>
    </div>

    <!-- ============ ENLACES ============ -->
    <ul class="links">
      <li><a href="https://search.google.com/local/writereview?placeid=ChIJXRhU24SIhkwR-a5Ak_Orcj8" target="_blank" rel="noopener"><i class="fa-brands fa-google"></i> Google Reviews</a></li>
      <li><a href="https://www.instagram.com/ginecologa.marianaruiz/" target="_blank" rel="noopener"><i class="fa-brands fa-instagram"></i> Instagram</a></li>
      <li><a href="https://wa.me/523310911654" target="_blank" rel="noopener"><i class="fa-brands fa-whatsapp"></i> Contacto</a></li>
    </ul>

    <!-- ============ DATOS DE CONTACTO ============ -->
    <div class="contact">
      <div class="specialties">
        <p>🌸 Especialista en Ginecología-Obstetricia</p>
        <p>🤰🏻 MMF</p>
        <p>🩺 Certificada por CMGO</p>
        <p>🌷 Atención integral de la mujer</p>
      </div>
      <div class="meta">
        <p>Del Tule 792 A, Puertas del Tule, 45017 Zapopan, Jal.</p>
        <p>+52 33 1091 1654 | @ginecologa.marianaruiz</p>
      </div>
    </div>

  </main>

</body>
</html>
